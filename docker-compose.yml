services:
  db:
    image: pgvector/pgvector:pg17
    container_name: evidencesplit-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evidencesplit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evidencesplit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: evidencesplit-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/evidencesplit
      SQL_ECHO: ${SQL_ECHO:-false}
      DEMO_MODE: ${DEMO_MODE:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-001}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-admin@example.com}
      OPENALEX_RESULT_LIMIT: ${OPENALEX_RESULT_LIMIT:-8}
      MAX_LIVE_FULL_TEXT_PAPERS: ${MAX_LIVE_FULL_TEXT_PAPERS:-5}
      REMOTE_DOWNLOAD_TIMEOUT_SECONDS: ${REMOTE_DOWNLOAD_TIMEOUT_SECONDS:-20}
      MAX_REMOTE_PDF_SIZE_MB: ${MAX_REMOTE_PDF_SIZE_MB:-25}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: evidencesplit-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
