services:
  db:
    image: pgvector/pgvector:pg17
    container_name: evidencesplit-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evidencesplit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evidencesplit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
